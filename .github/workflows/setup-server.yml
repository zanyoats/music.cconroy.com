name: Setup Music VPS

on:
  workflow_dispatch:
    inputs:
      region:
        description: Vultr region
        type: choice
        required: true
        options:
          - "ewr" # New Jersey
      plan:
        description: Vultr plan ID
        type: choice
        required: true
        options:
          - "vc2-1c-2gb" # 1 vCPU, 2 GB RAM
      os_id:
        description: Vultr OS ID
        type: choice
        required: true
        options:
          - "2076" # Alpine Linux x64
      firewall_group_id:
        description: Vultr firewall group ID
        type: choice
        required: true
        options:
          - "34b2d31c-b8e7-45b0-b4f4-4ff713afd0b8"
      label:
        description: Instance label
        required: false
      hostname:
        description: Instance hostname
        required: false
      sshkey_id:
        description: Vultr SSH key ID
        type: choice
        required: true
        options:
          - "6c6cf237-32b6-427c-8498-3af1ab9b6ae6"
      tag:
        description: Optional tag to apply
        required: false
      enable_ipv6:
        description: Enable IPv6 (true/false)
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.provision.outputs.public_ip }}
      instance_id: ${{ steps.provision.outputs.instance_id }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Provision Vultr instance
        id: provision
        env:
          VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
          REGION: ${{ inputs.region }}
          PLAN: ${{ inputs.plan }}
          OS_ID: ${{ inputs.os_id }}
          FIREWALL_GROUP_ID: ${{ inputs.firewall_group_id }}
          LABEL: ${{ inputs.label || format('music-cconroy-{0}', github.run_id) }}
          HOSTNAME: ${{ inputs.hostname || format('music-cconroy-{0}', github.run_id) }}
          SSHKEY_ID: ${{ inputs.sshkey_id }}
          TAG: ${{ inputs.tag || vars.VULTR_TAG }}
          ENABLE_IPV6: ${{ inputs.enable_ipv6 }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${VULTR_API_KEY:-}" ]; then
            echo "Missing VULTR_API_KEY secret."
            exit 1
          fi

          USER_DATA_TEMPLATE=".github/workflows/assets/vultr_user_data.sh"
          if [ ! -f "${USER_DATA_TEMPLATE}" ]; then
            echo "Missing ${USER_DATA_TEMPLATE} in repo."
            exit 1
          fi

          ENABLE_IPV6="$(echo "${ENABLE_IPV6:-false}" | tr '[:upper:]' '[:lower:]')"

          USER_DATA_B64="$(base64 -w 0 "${USER_DATA_TEMPLATE}" 2>/dev/null || base64 "${USER_DATA_TEMPLATE}" | tr -d '\n')"

          payload="$(jq -n \
            --arg region "${REGION}" \
            --arg plan "${PLAN}" \
            --arg os_id "${OS_ID}" \
            --arg firewall_group_id "${FIREWALL_GROUP_ID}" \
            --arg label "${LABEL}" \
            --arg hostname "${HOSTNAME}" \
            --arg sshkey_id "${SSHKEY_ID}" \
            --arg tag "${TAG}" \
            --arg enable_ipv6 "${ENABLE_IPV6}" \
            --arg user_data "${USER_DATA_B64}" \
            '{
              region: $region,
              plan: $plan,
              os_id: ($os_id | tonumber),
              user_data: $user_data
            }
            + (if ($label | length) > 0 then {label: $label} else {} end)
            + (if ($hostname | length) > 0 then {hostname: $hostname} else {} end)
            + (if ($sshkey_id | length) > 0 then {sshkey_id: [$sshkey_id]} else {} end)
            + (if ($firewall_group_id | length) > 0 then {firewall_group_id: $firewall_group_id} else {} end)
            + (if ($tag | length) > 0 then {tags: [$tag]} else {} end)
            + (if $enable_ipv6 == "true" then {enable_ipv6: true} else {} end)
            ')"

          response="$(curl -sS -X POST "https://api.vultr.com/v2/instances" \
            -H "Authorization: Bearer ${VULTR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${payload}")"

          instance_id="$(echo "${response}" | jq -r '.instance.id // empty')"
          if [ -z "${instance_id}" ]; then
            echo "Failed to create instance. Response:"
            echo "${response}"
            exit 1
          fi

          echo "instance_id=${instance_id}" >> "${GITHUB_OUTPUT}"

          public_ip=""
          for attempt in $(seq 1 60); do
            info="$(curl -sS "https://api.vultr.com/v2/instances/${instance_id}" \
              -H "Authorization: Bearer ${VULTR_API_KEY}")"
            public_ip="$(echo "${info}" | jq -r '.instance.main_ip // empty')"
            status="$(echo "${info}" | jq -r '.instance.status // empty')"

            if [ -n "${public_ip}" ] && [ "${public_ip}" != "0.0.0.0" ]; then
              break
            fi

            echo "Waiting for IP (attempt ${attempt}, status=${status:-unknown})..."
            sleep 10
          done

          if [ -z "${public_ip}" ] || [ "${public_ip}" = "0.0.0.0" ]; then
            echo "Timed out waiting for public IP."
            exit 1
          fi

          echo "public_ip=${public_ip}" >> "${GITHUB_OUTPUT}"
          echo "::notice title=Vultr IP::${public_ip}"
          echo "Public IP: ${public_ip}"

      - name: Report DEPLOY_HOST value
        if: ${{ steps.provision.outputs.public_ip != '' }}
        run: |
          echo "::notice title=Set DEPLOY_HOST::Set repository variable DEPLOY_HOST to ${{ steps.provision.outputs.public_ip }}"

      - name: Write provisioning summary
        if: ${{ always() }}
        run: |
          {
            echo "## Music VPS Provisioning"
            echo ""
            echo "- Instance ID: ${{ steps.provision.outputs.instance_id }}"
            echo "- Public IP: ${{ steps.provision.outputs.public_ip }}"
            echo "- Region: ${{ inputs.region }}"
            echo "- Plan: ${{ inputs.plan }}"
            echo "- OS ID: ${{ inputs.os_id }}"
            echo "- Firewall Group: ${{ inputs.firewall_group_id }}"
            echo ""
            echo "### Next steps"
            echo ""
            echo "1. Set repository variable \`DEPLOY_HOST\` to \`${{ steps.provision.outputs.public_ip }}\`."
            echo "2. Point DNS at \`${{ steps.provision.outputs.public_ip }}\`."
            echo "3. Run the \`Deploy Kukicha\` workflow."
          } >> "${GITHUB_STEP_SUMMARY}"
