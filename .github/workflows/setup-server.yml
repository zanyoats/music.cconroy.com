name: Setup Music VPS

on:
  workflow_dispatch:
    inputs:
      kukicha_version:
        description: Kukicha version to install
        required: true
        type: string
      region:
        description: Vultr region
        type: choice
        required: true
        options:
          - "ewr" # New Jersey
      plan:
        description: Vultr plan ID
        type: choice
        required: true
        options:
          - "vc2-1c-2gb" # 1 vCPU, 2 GB RAM
      os_id:
        description: Vultr OS ID
        type: choice
        required: true
        options:
          - "2076" # Alpine Linux x64
      firewall_group_id:
        description: Vultr firewall group ID
        type: choice
        required: true
        options:
          - "34b2d31c-b8e7-45b0-b4f4-4ff713afd0b8"
      label:
        description: Instance label
        required: false
      hostname:
        description: Instance hostname
        required: false
      sshkey_id:
        description: Vultr SSH key ID
        type: choice
        required: true
        options:
          - "6c6cf237-32b6-427c-8498-3af1ab9b6ae6"
      tag:
        description: Optional tag to apply
        required: false
      enable_ipv6:
        description: Enable IPv6 (true/false)
        required: false
        default: "false"
      update_variable:
        description: Update repo variable DEPLOY_HOST with new IP
        required: false
        default: "true"

permissions:
  contents: read
  actions: write

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.provision.outputs.public_ip }}
      instance_id: ${{ steps.provision.outputs.instance_id }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Provision Vultr instance
        id: provision
        env:
          VULTR_API_KEY: ${{ secrets.VULTR_API_KEY }}
          REGION: ${{ inputs.region }}
          PLAN: ${{ inputs.plan }}
          OS_ID: ${{ inputs.os_id }}
          FIREWALL_GROUP_ID: ${{ inputs.firewall_group_id }}
          LABEL: ${{ inputs.label || format('music-cconroy-{0}', github.run_id) }}
          HOSTNAME: ${{ inputs.hostname || format('music-cconroy-{0}', github.run_id) }}
          SSHKEY_ID: ${{ inputs.sshkey_id }}
          TAG: ${{ inputs.tag || vars.VULTR_TAG }}
          ENABLE_IPV6: ${{ inputs.enable_ipv6 }}
          KUKICHA_VERSION: ${{ inputs.kukicha_version }}
          KUKICHA_PASSWORD: ${{ secrets.KUKICHA_PASSWORD }}
          OPENSUBSONIC_PASSWORD: ${{ secrets.OPENSUBSONIC_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${VULTR_API_KEY:-}" ]; then
            echo "Missing VULTR_API_KEY secret."
            exit 1
          fi
          if [ -z "${KUKICHA_PASSWORD:-}" ]; then
            echo "Missing KUKICHA_PASSWORD secret."
            exit 1
          fi
          if [ -z "${OPENSUBSONIC_PASSWORD:-}" ]; then
            echo "Missing OPENSUBSONIC_PASSWORD secret."
            exit 1
          fi
          if [ -z "${KUKICHA_VERSION:-}" ]; then
            echo "Missing kukicha_version workflow input."
            exit 1
          fi
          case "${KUKICHA_VERSION}" in
            *[!A-Za-z0-9._+!-]*)
              echo "KUKICHA_VERSION contains unsupported characters."
              exit 1
              ;;
          esac

          USER_DATA_TEMPLATE=".github/workflows/assets/vultr_user_data.sh"
          if [ ! -f "${USER_DATA_TEMPLATE}" ]; then
            echo "Missing ${USER_DATA_TEMPLATE} in repo."
            exit 1
          fi
          KUKICHA_CONFIG_TEMPLATE=".github/workflows/assets/kukicha.toml"
          if [ ! -f "${KUKICHA_CONFIG_TEMPLATE}" ]; then
            echo "Missing ${KUKICHA_CONFIG_TEMPLATE} in repo."
            exit 1
          fi

          ENABLE_IPV6="$(echo "${ENABLE_IPV6:-false}" | tr '[:upper:]' '[:lower:]')"

          USER_DATA_RENDERED="$(mktemp)"
          if ! grep -q "__KUKICHA_VERSION__" "${USER_DATA_TEMPLATE}"; then
            echo "Missing __KUKICHA_VERSION__ placeholder in ${USER_DATA_TEMPLATE}."
            exit 1
          fi
          if ! grep -q "__KUKICHA_CONFIG_B64__" "${USER_DATA_TEMPLATE}"; then
            echo "Missing __KUKICHA_CONFIG_B64__ placeholder in ${USER_DATA_TEMPLATE}."
            exit 1
          fi
          if ! grep -q "__KUKICHA_PASSWORD_B64__" "${USER_DATA_TEMPLATE}"; then
            echo "Missing __KUKICHA_PASSWORD_B64__ placeholder in ${USER_DATA_TEMPLATE}."
            exit 1
          fi
          if ! grep -q "__OPENSUBSONIC_PASSWORD_B64__" "${USER_DATA_TEMPLATE}"; then
            echo "Missing __OPENSUBSONIC_PASSWORD_B64__ placeholder in ${USER_DATA_TEMPLATE}."
            exit 1
          fi

          encode_b64() {
            if base64 --help 2>/dev/null | grep -q -- "-w"; then
              base64 -w 0
            else
              base64 | tr -d '\n'
            fi
          }

          KUKICHA_CONFIG_B64="$(base64 -w 0 "${KUKICHA_CONFIG_TEMPLATE}" 2>/dev/null || base64 "${KUKICHA_CONFIG_TEMPLATE}" | tr -d '\n')"
          KUKICHA_PASSWORD_B64="$(printf '%s' "${KUKICHA_PASSWORD}" | encode_b64)"
          OPENSUBSONIC_PASSWORD_B64="$(printf '%s' "${OPENSUBSONIC_PASSWORD}" | encode_b64)"
          escaped_kukicha_version="$(printf '%s' "${KUKICHA_VERSION}" | sed -e 's/[&|\\]/\\&/g')"
          escaped_kukicha_config="$(printf '%s' "${KUKICHA_CONFIG_B64}" | sed -e 's/[&|\\]/\\&/g')"
          escaped_kukicha_password="$(printf '%s' "${KUKICHA_PASSWORD_B64}" | sed -e 's/[&|\\]/\\&/g')"
          escaped_opensubsonic_password="$(printf '%s' "${OPENSUBSONIC_PASSWORD_B64}" | sed -e 's/[&|\\]/\\&/g')"
          sed -e "s|__KUKICHA_VERSION__|${escaped_kukicha_version}|g" \
            -e "s|__KUKICHA_CONFIG_B64__|${escaped_kukicha_config}|g" \
            -e "s|__KUKICHA_PASSWORD_B64__|${escaped_kukicha_password}|g" \
            -e "s|__OPENSUBSONIC_PASSWORD_B64__|${escaped_opensubsonic_password}|g" \
            "${USER_DATA_TEMPLATE}" > "${USER_DATA_RENDERED}"

          USER_DATA_B64="$(base64 -w 0 "${USER_DATA_RENDERED}" 2>/dev/null || base64 "${USER_DATA_RENDERED}" | tr -d '\n')"

          payload="$(jq -n \
            --arg region "${REGION}" \
            --arg plan "${PLAN}" \
            --arg os_id "${OS_ID}" \
            --arg firewall_group_id "${FIREWALL_GROUP_ID}" \
            --arg label "${LABEL}" \
            --arg hostname "${HOSTNAME}" \
            --arg sshkey_id "${SSHKEY_ID}" \
            --arg tag "${TAG}" \
            --arg enable_ipv6 "${ENABLE_IPV6}" \
            --arg user_data "${USER_DATA_B64}" \
            '{
              region: $region,
              plan: $plan,
              os_id: ($os_id | tonumber),
              user_data: $user_data
            }
            + (if ($label | length) > 0 then {label: $label} else {} end)
            + (if ($hostname | length) > 0 then {hostname: $hostname} else {} end)
            + (if ($sshkey_id | length) > 0 then {sshkey_id: [$sshkey_id]} else {} end)
            + (if ($firewall_group_id | length) > 0 then {firewall_group_id: $firewall_group_id} else {} end)
            + (if ($tag | length) > 0 then {tags: [$tag]} else {} end)
            + (if $enable_ipv6 == "true" then {enable_ipv6: true} else {} end)
            ')"

          response="$(curl -sS -X POST "https://api.vultr.com/v2/instances" \
            -H "Authorization: Bearer ${VULTR_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${payload}")"

          instance_id="$(echo "${response}" | jq -r '.instance.id // empty')"
          if [ -z "${instance_id}" ]; then
            echo "Failed to create instance. Response:"
            echo "${response}"
            exit 1
          fi

          echo "instance_id=${instance_id}" >> "${GITHUB_OUTPUT}"

          public_ip=""
          for attempt in $(seq 1 60); do
            info="$(curl -sS "https://api.vultr.com/v2/instances/${instance_id}" \
              -H "Authorization: Bearer ${VULTR_API_KEY}")"
            public_ip="$(echo "${info}" | jq -r '.instance.main_ip // empty')"
            status="$(echo "${info}" | jq -r '.instance.status // empty')"

            if [ -n "${public_ip}" ] && [ "${public_ip}" != "0.0.0.0" ]; then
              break
            fi

            echo "Waiting for IP (attempt ${attempt}, status=${status:-unknown})..."
            sleep 10
          done

          if [ -z "${public_ip}" ] || [ "${public_ip}" = "0.0.0.0" ]; then
            echo "Timed out waiting for public IP."
            exit 1
          fi

          echo "public_ip=${public_ip}" >> "${GITHUB_OUTPUT}"
          echo "::notice title=Vultr IP::${public_ip}"
          echo "Public IP: ${public_ip}"

      - name: Update DEPLOY_HOST repo variable
        if: ${{ inputs.update_variable == 'true' && steps.provision.outputs.public_ip != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_IP: ${{ steps.provision.outputs.public_ip }}
        shell: bash
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/variables"
          body="$(jq -n --arg name "DEPLOY_HOST" --arg value "${PUBLIC_IP}" '{name: $name, value: $value}')"

          status="$(curl -sS -o /tmp/deploy-host-variable.json -w "%{http_code}" \
            -X PATCH "${api}/DEPLOY_HOST" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "${body}")"

          if [ "${status}" = "404" ]; then
            status="$(curl -sS -o /tmp/deploy-host-variable.json -w "%{http_code}" \
              -X POST "${api}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "${body}")"
          fi

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "Failed to update DEPLOY_HOST repo variable. HTTP ${status}:"
            cat /tmp/deploy-host-variable.json
            exit 1
          fi

      - name: Write provisioning summary
        if: ${{ always() }}
        run: |
          {
            echo "## Music VPS Provisioning"
            echo ""
            echo "- Instance ID: ${{ steps.provision.outputs.instance_id }}"
            echo "- Public IP: ${{ steps.provision.outputs.public_ip }}"
            echo "- Region: ${{ inputs.region }}"
            echo "- Plan: ${{ inputs.plan }}"
            echo "- OS ID: ${{ inputs.os_id }}"
            echo "- Firewall Group: ${{ inputs.firewall_group_id }}"
            echo "- Domain: music.cconroy.com"
            echo "- HTTPS proxy: Caddy -> 127.0.0.1:4533, enabled for future boots"
            echo "- Caddy initial start: skipped until DNS is configured"
            echo "- Kukicha version: ${{ inputs.kukicha_version }}"
            echo "- Kukicha config: /root/.config/kukicha/kukicha.toml"
            echo "- Kukicha service: OpenRC supervise-daemon, enabled for future boots"
            echo "- Kukicha logs: /var/log/kukicha/kukicha.log and /var/log/kukicha/kukicha.err.log"
            echo "- Kukicha auth secret files: configured"
            echo "- Open ports: 22/tcp, 80/tcp, 443/tcp"
          } >> "${GITHUB_STEP_SUMMARY}"
