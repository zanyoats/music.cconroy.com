name: Deploy Kukicha

on:
  workflow_dispatch:
    inputs:
      kukicha_version:
        description: Kukicha version to install. Leave blank to skip.
        required: false
        type: string
      update_config:
        description: Deploy .github/workflows/assets/kukicha.toml
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: root
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout repo
        if: ${{ inputs.update_config }}
        uses: actions/checkout@v4

      - name: Configure SSH
        if: ${{ inputs.update_config || inputs.kukicha_version != '' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "Missing DEPLOY_HOST repo variable."
            exit 1
          fi
          if [ -z "${DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing DEPLOY_SSH_PRIVATE_KEY secret."
            exit 1
          fi

          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/deploy_key"
          chmod 600 "${HOME}/.ssh/deploy_key"
          ssh-keyscan -H "${DEPLOY_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Deploy config
        if: ${{ inputs.update_config }}
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_SOURCE=".github/workflows/assets/kukicha.toml"
          if [ ! -f "${CONFIG_SOURCE}" ]; then
            echo "Missing ${CONFIG_SOURCE}."
            exit 1
          fi

          scp -i "${HOME}/.ssh/deploy_key" \
            "${CONFIG_SOURCE}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/kukicha.toml"

          ssh -i "${HOME}/.ssh/deploy_key" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sh -s" <<'REMOTE'
          set -eu

          mkdir -p /root/.config/kukicha
          cp /tmp/kukicha.toml /root/.config/kukicha/kukicha.toml
          chown root:root /root/.config /root/.config/kukicha /root/.config/kukicha/kukicha.toml
          chmod 700 /root/.config /root/.config/kukicha
          chmod 600 /root/.config/kukicha/kukicha.toml
          rm -f /tmp/kukicha.toml

          echo "Kukicha config deployed."
          REMOTE

      - name: Install Kukicha version
        if: ${{ inputs.kukicha_version != '' }}
        env:
          KUKICHA_VERSION: ${{ inputs.kukicha_version }}
        shell: bash
        run: |
          set -euo pipefail

          case "${KUKICHA_VERSION}" in
            *[!A-Za-z0-9._+!-]*)
              echo "KUKICHA_VERSION contains unsupported characters."
              exit 1
              ;;
          esac

          ssh -i "${HOME}/.ssh/deploy_key" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "KUKICHA_VERSION='${KUKICHA_VERSION}' sh -s" <<'REMOTE'
          set -eu

          UV_INSTALL_DIR="/usr/local/bin"
          UV_TOOL_DIR="/opt/uv/tools"
          UV_TOOL_BIN_DIR="/usr/local/bin"

          if [ ! -x "${UV_INSTALL_DIR}/uv" ]; then
            echo "Missing ${UV_INSTALL_DIR}/uv. Re-run setup or install uv on the server."
            exit 1
          fi

          export UV_TOOL_DIR UV_TOOL_BIN_DIR
          "${UV_INSTALL_DIR}/uv" tool install --force "kukicha==${KUKICHA_VERSION}"
          echo "Kukicha installed at ${KUKICHA_VERSION}."
          REMOTE

      - name: Restart Kukicha if running
        if: ${{ inputs.update_config || inputs.kukicha_version != '' }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i "${HOME}/.ssh/deploy_key" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sh -s" <<'REMOTE'
          set -eu

          if rc-service kukicha status >/dev/null 2>&1; then
            rc-service kukicha restart
            echo "Kukicha changed and running service restarted."
          else
            echo "Kukicha changed; service is not running, so it was not started."
          fi
          REMOTE

      - name: No deploy action requested
        if: ${{ !inputs.update_config && inputs.kukicha_version == '' }}
        run: echo "No config deploy or Kukicha version install requested."
