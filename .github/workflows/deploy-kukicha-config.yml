name: Deploy Kukicha Config

env:
  KUKICHA_VERSION: "0.1.0a2"

on:
  push:
    paths:
      - ".github/workflows/assets/kukicha.toml"
      - ".github/workflows/deploy-kukicha-config.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: root
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine deploy actions
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_SOURCE=".github/workflows/assets/kukicha.toml"
          WORKFLOW_SOURCE=".github/workflows/deploy-kukicha-config.yml"
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          deploy_config=false
          upgrade_kukicha=false

          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            deploy_config=true
            upgrade_kukicha=true
          else
            if ! git diff --quiet "${BEFORE}" "${AFTER}" -- "${CONFIG_SOURCE}"; then
              deploy_config=true
            fi

            previous_workflow="$(mktemp)"
            previous_version=""
            if git show "${BEFORE}:${WORKFLOW_SOURCE}" > "${previous_workflow}" 2>/dev/null; then
              previous_version="$(sed -nE "s/^[[:space:]]*KUKICHA_VERSION:[[:space:]]*['\"]?([^'\"#[:space:]]+)['\"]?.*$/\1/p" "${previous_workflow}" | head -n 1)"
            fi

            if [ "${previous_version}" != "${KUKICHA_VERSION}" ]; then
              upgrade_kukicha=true
            fi
          fi

          {
            echo "deploy_config=${deploy_config}"
            echo "upgrade_kukicha=${upgrade_kukicha}"
          } >> "${GITHUB_OUTPUT}"

          echo "Deploy config: ${deploy_config}"
          echo "Upgrade Kukicha: ${upgrade_kukicha}"

      - name: Configure SSH
        if: ${{ steps.changes.outputs.deploy_config == 'true' || steps.changes.outputs.upgrade_kukicha == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "Missing DEPLOY_HOST repo variable."
            exit 1
          fi
          if [ -z "${DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing DEPLOY_SSH_PRIVATE_KEY secret."
            exit 1
          fi

          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/deploy_key"
          chmod 600 "${HOME}/.ssh/deploy_key"
          ssh-keyscan -H "${DEPLOY_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Deploy config
        if: ${{ steps.changes.outputs.deploy_config == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_SOURCE=".github/workflows/assets/kukicha.toml"
          if [ ! -f "${CONFIG_SOURCE}" ]; then
            echo "Missing ${CONFIG_SOURCE}."
            exit 1
          fi

          scp -i "${HOME}/.ssh/deploy_key" \
            "${CONFIG_SOURCE}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/kukicha.toml"

          ssh -i "${HOME}/.ssh/deploy_key" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sh -s" <<'REMOTE'
          set -eu

          mkdir -p /root/.config/kukicha
          cp /tmp/kukicha.toml /root/.config/kukicha/kukicha.toml
          chown root:root /root/.config /root/.config/kukicha /root/.config/kukicha/kukicha.toml
          chmod 700 /root/.config /root/.config/kukicha
          chmod 600 /root/.config/kukicha/kukicha.toml
          rm -f /tmp/kukicha.toml

          echo "Kukicha config deployed."
          REMOTE

      - name: Upgrade Kukicha
        if: ${{ steps.changes.outputs.upgrade_kukicha == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${KUKICHA_VERSION:-}" ]; then
            echo "Missing KUKICHA_VERSION workflow env value."
            exit 1
          fi

          case "${KUKICHA_VERSION}" in
            *[!A-Za-z0-9._+!-]*)
              echo "KUKICHA_VERSION contains unsupported characters."
              exit 1
              ;;
          esac

          ssh -i "${HOME}/.ssh/deploy_key" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "KUKICHA_VERSION='${KUKICHA_VERSION}' sh -s" <<'REMOTE'
          set -eu

          UV_INSTALL_DIR="/usr/local/bin"
          UV_TOOL_DIR="/opt/uv/tools"
          UV_TOOL_BIN_DIR="/usr/local/bin"

          if [ ! -x "${UV_INSTALL_DIR}/uv" ]; then
            echo "Missing ${UV_INSTALL_DIR}/uv. Re-run setup or install uv on the server."
            exit 1
          fi

          export UV_TOOL_DIR UV_TOOL_BIN_DIR
          "${UV_INSTALL_DIR}/uv" tool install --force "kukicha==${KUKICHA_VERSION}"
          echo "Kukicha upgraded to ${KUKICHA_VERSION}."
          REMOTE

      - name: Restart Kukicha if running
        if: ${{ steps.changes.outputs.deploy_config == 'true' || steps.changes.outputs.upgrade_kukicha == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i "${HOME}/.ssh/deploy_key" \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sh -s" <<'REMOTE'
          set -eu

          if rc-service kukicha status >/dev/null 2>&1; then
            rc-service kukicha restart
            echo "Kukicha changed and running service restarted."
          else
            echo "Kukicha changed; service is not running, so it was not started."
          fi
          REMOTE

      - name: No deploy action needed
        if: ${{ steps.changes.outputs.deploy_config != 'true' && steps.changes.outputs.upgrade_kukicha != 'true' }}
        run: echo "No Kukicha config or version change detected."
